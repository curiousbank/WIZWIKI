default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "sms"
      threads: <%= ENV.fetch("SMS_JOB_THREADS", 2) %>
      processes: <%= ENV.fetch("SMS_JOB_CONCURRENCY", 1) %>
      polling_interval: 0.05
    - queues: "comms_bulk"
      threads: <%= ENV.fetch("COMMS_BULK_JOB_THREADS", 1) %>
      processes: <%= ENV.fetch("COMMS_BULK_JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    - queues: "default"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
